<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Promotion</title>
<link rel="stylesheet" href="style.css">
</head>

<body onload="loadStudents()">

<header>
<nav>
<a href="index.html">Accueil</a>
<a href="promotion.html">Promotion</a>
<a href="apropos.html">À propos</a>
<a href="administrateur.html">Administration</a>
</nav>
</header>

<section class="section">
<h2> les promotions des conception conception d'application </h2>
<p class="section-intro">Découvrez le parcours inspirant de nos meilleurs élèves qui ont poursuivi leur chemin vers le succès.</p>

<div class="cards" id="students-cards">
<!-- Students will be loaded here by JS -->
</div>
</section>

<footer>
<p> 2026 Site de l'école</p>
</footer>

<script>
function loadStudents() {
    const students = JSON.parse(localStorage.getItem('students')) || [
        { id: 1, nom: 'MENGUE', prenom: 'alpha', promotion: '2026', specialite: 'developpeur web', entreprise: 'Bourse d\'excellence', image: 'images/mengue-alpha.svg' },
        { id: 2, nom: 'SEP', prenom: 'tresor', promotion: '2026', specialite: 'Ingénieur informatique', entreprise: 'Google France', image: 'images/sep-tresor.svg' },
        { id: 3, nom: 'LYNA', prenom: 'raoul', promotion: '2026', specialite: 'Designer graphique', entreprise: 'Agence créative parisienne', image: 'images/lyna-raoul.svg' },
        { id: 4, nom: 'OTOGO', prenom: 'tresor', promotion: '2026', specialite: 'analyste data', entreprise: 'McKinsey & Company', image: 'images/otogo-tresor.svg' }
    ];
    const cardsContainer = document.getElementById('students-cards');
    cardsContainer.innerHTML = '';
    students.forEach(student => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <img class="card-img" src="${student.image}" alt="Photo de ${student.nom} ${student.prenom}" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
            <div style="display:none; width:100px; height:100px; background:#ffa500; border-radius:50%; margin:0 auto 15px; display:flex; align-items:center; justify-content:center; color:white; font-weight:bold; font-size:24px;">${student.prenom[0]}</div>
            <h3>${student.nom} ${student.prenom}</h3>
            <p><strong>Promotion ${student.promotion}</strong></p>
            <p>${student.specialite}</p>
            <p class="card-subtitle">${student.entreprise}</p>
        `;
        cardsContainer.appendChild(card);
    });
}

loadStudents();
</script>

</body>
</html>
